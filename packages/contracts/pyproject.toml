[project]
name = "forkreplay-contracts"
version = "0.0.1"
description = "Shared OpenAPI and JSON schemas for ForkReplay services."
requires-python = ">=3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["openapi", "schemas"]
